# Dev only — for local development. Production uses docker-compose.proxy.yml + docker-compose.control.yml

x-license: &license
  # Generate with: ./generate-license.sh design_partner <org-id>
  CLAMPD_LICENSE_KEY: ${CLAMPD_LICENSE_KEY:?CLAMPD_LICENSE_KEY is required — set it in .env}

services:
  postgres:
    image: postgres:16-alpine
    container_name: clampd-postgres
    environment:
      POSTGRES_USER: clampd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set it in .env}
      POSTGRES_DB: clampd
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../demo/seed.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../demo/seed-demo.sql:/docker-entrypoint-initdb.d/02-seed-demo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clampd"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clampd-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required — set it in .env}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: clampd-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: >
      --auth ${NATS_TOKEN:?NATS_TOKEN is required — set it in .env}
      --jetstream --store_dir /data -m 8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  opa:
    image: openpolicyagent/opa:0.70.0-static
    container_name: clampd-opa
    command: ["run", "--server", "--addr", ":8181", "--log-level", "info", "/policies"]
    volumes:
      - ../policies:/policies:ro
    ports:
      - "8181:8181"

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: clampd-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
      - ../demo/clickhouse-init.sql:/docker-entrypoint-initdb.d/01-shadow-logs.sql:ro
    environment:
      CLICKHOUSE_DEFAULT_MAX_MEMORY_USAGE: "805306368"
      CLICKHOUSE_DEFAULT_MAX_MEMORY_USAGE_FOR_USER: "402653184"
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  mock-tool:
    build:
      context: ../demo/mock-tool
      dockerfile: Dockerfile
    container_name: clampd-mock-tool
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5555/health')\""]
      interval: 5s
      timeout: 3s
      retries: 3

  dashboard-migrate:
    build:
      context: ../dashboard/api
      dockerfile: Dockerfile
    container_name: clampd-dashboard-migrate
    profiles: ["dashboard", "full"]
    command: ["node", "dist/db/migrate.js"]
    environment:
      DATABASE_URL: postgres://clampd:${POSTGRES_PASSWORD}@postgres:5432/clampd
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  dashboard-api:
    build:
      context: ../dashboard/api
      dockerfile: Dockerfile
    container_name: clampd-dashboard-api
    profiles: ["dashboard", "full"]
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://clampd:${POSTGRES_PASSWORD}@postgres:5432/clampd
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      CLAMPD_LICENSE_KEY: ${CLAMPD_LICENSE_KEY}
      CLICKHOUSE_URL: http://clickhouse:8123
    volumes:
      - ../dashboard/api/src:/app/src
    depends_on:
      dashboard-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: on-failure

  dashboard-web:
    build:
      context: ../dashboard/web
      dockerfile: Dockerfile.dev
    container_name: clampd-dashboard-web
    profiles: ["dashboard", "full"]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - dashboard-api
    restart: on-failure

  # --- Rust Runtime Services ---

  ag-registry:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-registry
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.10"
          memory: 32M
    environment:
      <<: *license
      AG_REGISTRY_PORT: "50051"
      DATABASE_URL: postgres://clampd:${POSTGRES_PASSWORD}@postgres:5432/clampd
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      RUST_LOG: "info,ag_registry=debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: on-failure

  ag-intent:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-intent
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.20"
          memory: 64M
    environment:
      <<: *license
      AG_INTENT_PORT: "50051"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      RUST_LOG: "info,ag_intent=debug"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: on-failure

  ag-policy:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-policy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.10"
          memory: 48M
    environment:
      <<: *license
      AG_POLICY_PORT: "50051"
      OPA_URL: http://opa:8181
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      RUST_LOG: "info,ag_policy=debug"
    depends_on:
      opa:
        condition: service_started
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: on-failure

  ag-token:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-token
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.10"
          memory: 32M
    environment:
      <<: *license
      AG_TOKEN_PORT: "50051"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgres://clampd:${POSTGRES_PASSWORD}@postgres:5432/clampd
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      IDP_PROVIDER: "none"                    # Options: none, keycloak, okta, azure_ad
      # IDP_CONFIG_SOURCE: "env"              # "env" or "database"
      # --- Uncomment below to enable Keycloak ---
      # IDP_PROVIDER: "keycloak"
      # KEYCLOAK_URL: "http://keycloak:8080"
      # KEYCLOAK_REALM: "clampd"
      # KEYCLOAK_CLIENT_ID: "ag-token"
      # KEYCLOAK_CLIENT_SECRET: "change-me"
      RUST_LOG: "info,ag_token=debug"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: on-failure

  ag-gateway:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-gateway
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    ports:
      - "8080:8080"
      - "9090:9090"
    deploy:
      replicas: 1                          # K8s HPA: 3-50; local: 1 (host port)
      resources:
        limits:
          cpus: "0.10"
          memory: 32M
    environment:
      <<: *license
      AG_GATEWAY_PORT: "8080"
      AG_GATEWAY_METRICS_PORT: "9090"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      REGISTRY_URL: http://ag-registry:50051
      INTENT_URL: http://ag-intent:50051
      POLICY_URL: http://ag-policy:50051
      TOKEN_URL: http://ag-token:50051
      KILL_URL: http://ag-kill:50055
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      RUST_LOG: "info,ag_gateway=debug"
    depends_on:
      ag-registry:
        condition: service_started
      ag-intent:
        condition: service_started
      ag-policy:
        condition: service_started
      ag-token:
        condition: service_started
      ag-shadow:
        condition: service_started
      ag-kill:
        condition: service_started
      mock-tool:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: on-failure

  ag-shadow:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-shadow
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.10"
          memory: 48M
    environment:
      <<: *license
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      CLICKHOUSE_URL: http://clickhouse:8123
      PII_NER_ENABLED: "true"
      PII_TOKENIZATION_ENABLED: "false"       # Set "true" + PII_ENCRYPTION_KEY to enable vault
      # PII_ENCRYPTION_KEY: "<64-hex-chars>"  # Required when PII_TOKENIZATION_ENABLED=true
      # PII_TOKEN_TTL_DAYS: "30"
      # REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379         # Required when PII_TOKENIZATION_ENABLED=true
      RUST_LOG: "info,ag_shadow=debug"
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: on-failure

  ag-kill:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-kill
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.05"
          memory: 16M
    environment:
      <<: *license
      AG_KILL_PORT: "50055"
      DATABASE_URL: postgres://clampd:${POSTGRES_PASSWORD}@postgres:5432/clampd
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      TOKEN_URL: http://ag-token:50051
      REGISTRY_URL: http://ag-registry:50051
      RUST_LOG: "info,ag_kill=debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      ag-token:
        condition: service_started
      ag-registry:
        condition: service_started
    restart: on-failure

  ag-risk:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-risk
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.10"
          memory: 48M
    environment:
      <<: *license
      AG_RISK_PORT: "50056"
      AG_RISK_WS_PORT: "8081"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      KILL_URL: http://ag-kill:50055
      REGISTRY_URL: http://ag-registry:50051
      RUST_LOG: "info,ag_risk=debug"
      AG_RISK_LEADER_FOLLOWER: true
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      ag-kill:
        condition: service_started
    restart: on-failure

  ag-control:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-control
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.10"
          memory: 48M
    environment:
      <<: *license
      AG_CONTROL_PORT: "50057"
      DATABASE_URL: postgres://clampd:${POSTGRES_PASSWORD}@postgres:5432/clampd
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://${NATS_TOKEN}@nats:4222
      REGISTRY_URL: http://ag-registry:50051
      KILL_URL: http://ag-kill:50055
      CLICKHOUSE_URL: http://clickhouse:8123
      CLAMPD_SAAS_URL: ${CLAMPD_SAAS_URL:-http://host.docker.internal:3001}
      CLAMPD_LICENSE_TOKEN: ${CLAMPD_LICENSE_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      CLAMPD_POLL_INTERVAL: "5"
      RUST_LOG: "info,ag_control=debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      ag-registry:
        condition: service_started
    restart: on-failure

  # --- Uncomment to add Keycloak service ---
#   keycloak:
#     image: quay.io/keycloak/keycloak:24.0
#     container_name: clampd-keycloak
#     command: start-dev
#     environment:
#       KEYCLOAK_ADMIN: admin
#       KEYCLOAK_ADMIN_PASSWORD: admin
#     ports:
#       - "8180:8080"

  # --- Red Team Testing (optional profile) ---
  ag-redteam:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-redteam
    container_name: clampd-ag-redteam
    profiles: ["redteam"]
    ports:
      - "3002:3002"
    environment:
      AG_REDTEAM_PORT: "3002"
      INTENT_URL: http://ag-intent:50051
      AG_INTERNAL_SECRET: ${AG_INTERNAL_SECRET:-}
      RUST_LOG: "info,ag_redteam=debug"
    depends_on:
      ag-intent:
        condition: service_started
    restart: on-failure

  # --- Observability (optional profile) ---
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: clampd-jaeger
    profiles: ["observability"]
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: clampd-prometheus
    profiles: ["observability"]
    volumes:
      - ../services/deploy/grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      ag-gateway:
        condition: service_started
    restart: on-failure

  grafana:
    image: grafana/grafana:10.4.0
    container_name: clampd-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: clampd
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/clampd-dashboard.json
    volumes:
      - ../services/deploy/grafana/clampd-dashboard.json:/var/lib/grafana/dashboards/clampd-dashboard.json:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: on-failure

volumes:
  pg_data:
  redis_data:
  nats_data:
  ch_data:
  prometheus_data:
  grafana_data:
