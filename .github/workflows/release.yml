name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-cli:
    name: Build CLI binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Build CLI via Docker
        run: |
          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            -f services/deploy/Dockerfile.cli \
            -t clampd-cli:${{ matrix.arch }} \
            --load .

      - name: Extract binary
        run: |
          mkdir -p dist
          docker create --name extract clampd-cli:${{ matrix.arch }}
          docker cp extract:/usr/local/bin/clampd ./dist/clampd-linux-${{ matrix.arch }}
          docker rm extract
          chmod +x ./dist/clampd-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: clampd-linux-${{ matrix.arch }}
          path: dist/clampd-linux-${{ matrix.arch }}

  docker-images:
    name: Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push service images
        run: |
          TAG="${GITHUB_REF_NAME}"
          SERVICES="ag-gateway ag-registry ag-intent ag-policy ag-token ag-shadow ag-kill ag-risk ag-control"
          for svc in $SERVICES; do
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              -f services/deploy/Dockerfile.service \
              --build-arg SERVICE_NAME=$svc \
              -t ${{ env.IMAGE_PREFIX }}/$svc:${TAG} \
              -t ${{ env.IMAGE_PREFIX }}/$svc:latest \
              --push .
          done

      - name: Build and push CLI image
        run: |
          TAG="${GITHUB_REF_NAME}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f services/deploy/Dockerfile.cli \
            -t ${{ env.IMAGE_PREFIX }}/clampd-cli:${TAG} \
            -t ${{ env.IMAGE_PREFIX }}/clampd-cli:latest \
            --push .

  release:
    name: Create GitHub Release
    needs: [build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
