# Clampd Proxy — Lightweight deployment (gateway + classification only)
# Usage: docker compose -f docker-compose.proxy.yml up -d
#
# Requires: .env file with CLAMPD_LICENSE_KEY and JWT_SECRET
# Exposes:  port 8080 (gateway API)

x-license: &license
  # Generate with: ./generate-license.sh design_partner <org-id>
  CLAMPD_LICENSE_KEY: ${CLAMPD_LICENSE_KEY:?CLAMPD_LICENSE_KEY is required — set it in .env}

x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:noexec,nosuid,size=64m
  restart: on-failure

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  opa:
    image: openpolicyagent/opa:0.70.0-static
    command: ["run", "--server", "--addr", ":8181", "--log-level", "error"]

  ag-intent:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-intent
    <<: *security
    environment:
      <<: *license
      AG_INTENT_PORT: "50051"
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      RUST_LOG: "info,ag_intent=info"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  ag-policy:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-policy
    <<: *security
    environment:
      <<: *license
      AG_POLICY_PORT: "50051"
      OPA_URL: http://opa:8181
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      RUST_LOG: "info,ag_policy=info"
    depends_on:
      opa:
        condition: service_started
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  ag-gateway:
    build:
      context: ..
      dockerfile: services/deploy/Dockerfile.service
      args:
        SERVICE_NAME: ag-gateway
    <<: *security
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      <<: *license
      AG_GATEWAY_PORT: "8080"
      AG_GATEWAY_METRICS_PORT: "9090"
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      INTENT_URL: http://ag-intent:50051
      POLICY_URL: http://ag-policy:50051
      JWT_SECRET: ${JWT_SECRET}
      RUST_LOG: "info,ag_gateway=info"
    depends_on:
      ag-intent:
        condition: service_started
      ag-policy:
        condition: service_started
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  redis_data:
  nats_data:
