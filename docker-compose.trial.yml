# Clampd Trial — Single-command deployment
#
# Usage:
#   1. Get a trial license at https://clampd.dev
#   2. Set your license key below (replace YOUR_TRIAL_LICENSE_KEY)
#   3. Run: docker compose -f docker-compose.trial.yml up -d
#
# What this includes:
#   - All 9 Clampd proxy services (hardened distroless images)
#   - PostgreSQL, Redis, NATS, ClickHouse (infrastructure)
#   - Dashboard (web UI + API)
#   - Mock tool server (for testing)
#
# Trial limits: 2 agents, 90 days, full features

x-license: &license
  # Generate with: ./generate-license.sh design_partner <org-id>
  CLAMPD_LICENSE_KEY: ${CLAMPD_LICENSE_KEY:?CLAMPD_LICENSE_KEY is required — set it in .env}

x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:noexec,nosuid,size=64m

services:
  # ─── Infrastructure ───────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: clampd-postgres
    environment:
      POSTGRES_USER: clampd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clampd_trial}
      POSTGRES_DB: clampd
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clampd"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clampd-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-clampd_trial}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-clampd_trial}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    container_name: clampd-nats
    ports:
      - "4222:4222"
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: clampd-clickhouse
    ports:
      - "8123:8123"
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Clampd Proxy Services ────────────────────────────────────────

  ag-registry:
    image: registry.clampd.dev/ag-registry:latest
    container_name: clampd-ag-registry
    <<: *security
    ports:
      - "50051:50051"
    environment:
      <<: *license
      AG_REGISTRY_PORT: "50051"
      DATABASE_URL: postgres://clampd:${POSTGRES_PASSWORD:-clampd_trial}@postgres:5432/clampd
      REDIS_URL: redis://:${REDIS_PASSWORD:-clampd_trial}@redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  ag-intent:
    image: registry.clampd.dev/ag-intent:latest
    container_name: clampd-ag-intent
    <<: *security
    environment:
      <<: *license
      AG_INTENT_PORT: "50051"
      REDIS_URL: redis://:${REDIS_PASSWORD:-clampd_trial}@redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  ag-policy:
    image: registry.clampd.dev/ag-policy:latest
    container_name: clampd-ag-policy
    <<: *security
    environment:
      <<: *license
      AG_POLICY_PORT: "50051"
      REDIS_URL: redis://:${REDIS_PASSWORD:-clampd_trial}@redis:6379
      NATS_URL: nats://nats:4222
    depends_on:
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  ag-token:
    image: registry.clampd.dev/ag-token:latest
    container_name: clampd-ag-token
    <<: *security
    environment:
      <<: *license
      AG_TOKEN_PORT: "50051"
      REDIS_URL: redis://:${REDIS_PASSWORD:-clampd_trial}@redis:6379
      NATS_URL: nats://nats:4222
      IDP_PROVIDER: "none"
    depends_on:
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  ag-gateway:
    image: registry.clampd.dev/ag-gateway:latest
    container_name: clampd-ag-gateway
    <<: *security
    ports:
      - "8080:8080"
    environment:
      <<: *license
      AG_GATEWAY_PORT: "8080"
      REDIS_URL: redis://:${REDIS_PASSWORD:-clampd_trial}@redis:6379
      NATS_URL: nats://nats:4222
      REGISTRY_URL: http://ag-registry:50051
      INTENT_URL: http://ag-intent:50051
      POLICY_URL: http://ag-policy:50051
      TOKEN_URL: http://ag-token:50051
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      ag-registry: { condition: service_started }
      ag-intent: { condition: service_started }
      ag-policy: { condition: service_started }
      ag-token: { condition: service_started }
      ag-shadow: { condition: service_started }
      ag-kill: { condition: service_started }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  ag-shadow:
    image: registry.clampd.dev/ag-shadow:latest
    container_name: clampd-ag-shadow
    <<: *security
    environment:
      <<: *license
      NATS_URL: nats://nats:4222
      CLICKHOUSE_URL: http://clickhouse:8123
    depends_on:
      nats: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    restart: unless-stopped

  ag-kill:
    image: registry.clampd.dev/ag-kill:latest
    container_name: clampd-ag-kill
    <<: *security
    environment:
      <<: *license
      AG_KILL_PORT: "50055"
      DATABASE_URL: postgres://clampd:${POSTGRES_PASSWORD:-clampd_trial}@postgres:5432/clampd
      REDIS_URL: redis://:${REDIS_PASSWORD:-clampd_trial}@redis:6379
      NATS_URL: nats://nats:4222
      TOKEN_URL: http://ag-token:50051
      REGISTRY_URL: http://ag-registry:50051
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  ag-risk:
    image: registry.clampd.dev/ag-risk:latest
    container_name: clampd-ag-risk
    <<: *security
    ports:
      - "8081:8081"
    environment:
      <<: *license
      AG_RISK_PORT: "50056"
      AG_RISK_WS_PORT: "8081"
      REDIS_URL: redis://:${REDIS_PASSWORD:-clampd_trial}@redis:6379
      NATS_URL: nats://nats:4222
      KILL_URL: http://ag-kill:50055
    depends_on:
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  ag-control:
    image: registry.clampd.dev/ag-control:latest
    container_name: clampd-ag-control
    <<: *security
    environment:
      <<: *license
      AG_CONTROL_PORT: "50057"
      REDIS_URL: redis://:${REDIS_PASSWORD:-clampd_trial}@redis:6379
      NATS_URL: nats://nats:4222
      REGISTRY_URL: http://ag-registry:50051
      KILL_URL: http://ag-kill:50055
    depends_on:
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    restart: unless-stopped

  # ─── Dashboard ────────────────────────────────────────────────────

  dashboard-api:
    image: registry.clampd.dev/dashboard-api:latest
    container_name: clampd-dashboard-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://clampd:${POSTGRES_PASSWORD:-clampd_trial}@postgres:5432/clampd
      REDIS_URL: redis://:${REDIS_PASSWORD:-clampd_trial}@redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GATEWAY_URL: http://ag-gateway:8080
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  dashboard-web:
    image: registry.clampd.dev/dashboard-web:latest
    container_name: clampd-dashboard-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - dashboard-api
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  nats_data:
  ch_data:
