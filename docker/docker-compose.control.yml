# Clampd Dashboard — Control Plane
#
# Runs the Dashboard (API + Web + Migrations).
# Requires shared infrastructure from docker-compose.infra.yml
# (same Postgres, Redis, NATS as the proxy pipeline).
#
# Usage (with proxy + local infrastructure):
#   docker compose -f docker-compose.infra.yml \
#                  -f docker-compose.proxy.yml \
#                  -f docker-compose.control.yml up -d
#
# Usage (with managed databases — Neon, Upstash):
#   Set DATABASE_URL, REDIS_URL, NATS_URL in .env, then:
#   docker compose -f docker-compose.proxy.yml -f docker-compose.control.yml up -d
#
# The dashboard shares Postgres and NATS with the proxy services.
# ag-control syncs API keys and agent state between them.

services:
  # ── Migrations (runs once, then exits) ─────────────────────────

  dashboard-migrate:
    image: ghcr.io/clampd/dashboard-api:${CLAMPD_VERSION:-v0.9.0}
    command: ["node", "dist/db/migrate.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://clampd:${POSTGRES_PASSWORD}@postgres:5432/clampd}
    networks:
      - clampd-shared
    restart: "no"

  # ── Application ────────────────────────────────────────────────

  dashboard-api:
    image: ghcr.io/clampd/dashboard-api:${CLAMPD_VERSION:-v0.9.0}
    restart: on-failure
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      # Shared Postgres — same database as ag-registry, ag-token, ag-kill, ag-control
      DATABASE_URL: ${DATABASE_URL:-postgres://clampd:${POSTGRES_PASSWORD}@postgres:5432/clampd}
      # Shared Redis — same instance as all ag-* services
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      # Shared NATS — receives risk events, kill/revive notifications
      NATS_URL: ${NATS_URL:-nats://${NATS_TOKEN}@nats:4222}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      CLAMPD_LICENSE_KEY: ${CLAMPD_LICENSE_KEY:-}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      # ClickHouse (optional — for audit log queries)
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      # Optional integrations
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Clampd <noreply@clampd.dev>}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Set to "true" for self-hosted/local — skips email verification on signup
      CLAMPD_AUTO_VERIFY_EMAIL: ${CLAMPD_AUTO_VERIFY_EMAIL:-true}
    networks:
      - clampd-shared
    depends_on:
      dashboard-migrate:
        condition: service_completed_successfully

  dashboard-web:
    image: ghcr.io/clampd/dashboard-web:${CLAMPD_VERSION:-v0.9.0}
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    networks:
      - clampd-shared
    depends_on:
      - dashboard-api

networks:
  clampd-shared:
    external: true
    name: clampd-shared
